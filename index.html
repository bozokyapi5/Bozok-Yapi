<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bozok Yapı Sorgulama</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f9; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding: 15px 10px; box-sizing: border-box; }
        .card { background: white; padding: 25px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; margin-bottom: 15px; }
        h2 { color: #2c3e50; margin-bottom: 5px; font-size: 22px; }
        .sub-title { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #edf2f7; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; -webkit-appearance: none; }
        select:focus, input:focus { border-color: #3498db; }
        button { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .iban-btn { background-color: #2ecc71; margin-top: 8px; font-size: 14px; padding: 12px; }
        #result, #iban-area { margin-top: 20px; padding: 18px; border-radius: 12px; text-align: left; display: none; background: #f8fafc; border: 1px solid #e2e8f0; animation: fadeIn 0.4s ease-out; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .total-row { border-top: 2px solid #e2e8f0; margin-top: 10px; padding-top: 10px; color: #e74c3c; font-weight: bold; font-size: 18px; }
        .warnings { width: 100%; max-width: 400px; text-align: left; background: #fff5f5; padding: 15px; border-radius: 15px; border: 5px solid #e74c3c; box-sizing: border-box; margin-top: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>Bozok Yapı</h2>
        <div class="sub-title">Nisan 2026 Aidat Sorgulama</div>
        
        <select id="daireSelect"><option value="">Dairenizi Seçin</option></select>
        <input type="password" id="passInput" placeholder="Size Özel Şifre" inputmode="numeric">
        
        <button id="queryBtn">SORGULA</button>
        <button class="iban-btn" id="ibanToggle">ÖDEME BİLGİLERİ (IBAN)</button>
        
        <div id="iban-area">
            <div style="font-weight: bold; color: #27ae60; margin-bottom: 5px;">Bozok Yapı Yönetimi</div>
            <div style="font-size: 13px; line-height: 1.6;">
                <b>IBAN:</b> TR00 0000 0000 0000 0000 0000 00<br>
                <b>Alıcı:</b> Apartman Yönetimi<br>
                <span style="color:#e67e22;">* Açıklama: Daire No ve İsim yazınız.</span>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        // 1. Daire listesini otomatik doldur
        const select = document.getElementById('daireSelect');
        for (let i = 1; i <= 31; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = "Daire No: " + i;
            select.appendChild(opt);
        }

        // 2. Base64 Çözücü (Türkçe karakter desteği ile)
        const decode = (str) => {
            if (!str) return "0";
            try {
                return decodeURIComponent(escape(window.atob(str)));
            } catch (e) {
                return window.atob(str);
            }
        };

        // 3. Sorgulama Fonksiyonu
        async function sorgula() {
            const d = document.getElementById('daireSelect').value;
            const p = document.getElementById('passInput').value;
            const res = document.getElementById('result');
            const btn = document.getElementById('queryBtn');

            if (!d || !p) {
                alert("Lütfen daire seçin ve şifrenizi girin.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sorgulanıyor...";
            res.style.display = "none";

            try {
                // Kendi GitHub deponuzdaki dosyayı okur
                const response = await fetch('veriler.json');
                if (!response.ok) throw new Error("Veri dosyası bulunamadı.");
                
                const data = await response.json();
                
                // Maskelenmiş veriler içinde eşleşme ara
                const kayit = data.find(item => decode(item["Daire No"]) === String(d));

                if (kayit && decode(kayit["Şifre"]) === String(p)) {
                    res.style.display = "block";
                    res.innerHTML = `
                        <div class="res-row"><span>🏠 Daire:</span> <b>${decode(kayit["Daire No"])}</b></div>
                        <div class="res-row"><span>💰 Geçmiş Borç:</span> <b>${decode(kayit["Geçmiş Borç"])} TL</b></div>
                        <div class="res-row"><span>📅 Nisan Aidatı:</span> <b>${decode(kayit["Nisan Aidatı"])} TL</b></div>
                        <div class="res-row total-row"><span>TOPLAM:</span> <span>${decode(kayit["Toplam"])} TL</span></div>
                    `;
                } else {
                    alert("Daire veya şifre hatalı!");
                }
            } catch (e) {
                console.error(e);
                alert("Sistem henüz güncellenmemiş veya veri dosyası boş. Lütfen GitHub Actions üzerinden 'Run Workflow' yapın.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SORGULA";
            }
        }

        // 4. Olay Dinleyicileri (Event Listeners)
        document.getElementById('queryBtn').addEventListener('click', sorgula);
        document.getElementById('ibanToggle').addEventListener('click', () => {
            const area = document.getElementById('iban-area');
            area.style.display = area.style.display === "block" ? "none" : "block";
        });
    </script>
</body>
</html>
