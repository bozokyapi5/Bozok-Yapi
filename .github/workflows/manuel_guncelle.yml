name: Verileri Manuel Guncelle
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4 # v3'ten v4'e yükseltildi

      - name: Python Kur
        uses: actions/setup-python@v5 # v4'ten v5'e yükseltildi
        with:
          python-version: '3.9'

      - name: Bagimliliklari Yukle
        run: |
          pip install pandas requests

      - name: Guncelleme Kodunu Calistir
        run: python guncelle.py

      - name: Degisiklikleri Kaydet
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add veriler.json
          # Değişiklik varsa: Önce buluttaki son halini çek (rebase), sonra yükle
          git diff --quiet && git diff --staged --quiet || (git pull --rebase origin main && git commit -m "Aidat verileri guncellendi" && git push)
